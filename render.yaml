services:
  - type: web
    name: equipment-list-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: equipment_list
      - key: MONGODB_COLLECTION
        value: assignments
      - key: FRONTEND_ORIGIN
        value: "*"
